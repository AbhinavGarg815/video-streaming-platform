services:
  - type: web
    name: video-backend
    env: docker
    dockerfilePath: Dockerfile.backend
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ACCESS_TOKEN_TTL
        value: 1h
      - key: REFRESH_TOKEN_TTL
        value: 168h
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: ORIGINAL_VIDEO_BUCKET
        value: video-app-originals
      - key: COMPLETION_QUEUE_URL
        sync: false
      - key: CDN_BASE_URL
        value: https://d26jaa9z4vqbr2.cloudfront.net

  - type: worker
    name: completion-worker
    env: docker
    dockerfilePath: Dockerfile.completion-worker
    plan: starter
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: COMPLETION_QUEUE_URL
        sync: false

  - type: worker
    name: video-transcoder
    env: docker
    rootDir: video-transcoder
    dockerfilePath: Dockerfile
    plan: starter
    autoDeploy: true
    envVars:
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: TRANSCODE_QUEUE_URL
        sync: false
      - key: COMPLETION_QUEUE_URL
        sync: false
      - key: ORIGINAL_VIDEO_BUCKET
        value: video-app-originals
      - key: TRANSCODED_BUCKET
        value: video-app-transcoded
      - key: FFMPEG_BINARY
        value: ffmpeg
      - key: WORK_DIR
        value: /tmp/transcoder
      - key: SQS_WAIT_TIME_SECONDS
        value: 20
      - key: SQS_MAX_MESSAGES
        value: 1
      - key: SQS_VISIBILITY_TIMEOUT_SECONDS
        value: 900
      - key: POLL_INTERVAL
        value: 2s
